<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ifafa Observe Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="observe-lab-page">
  <div id="observeLabApp">
    <video id="labCamera" playsinline autoplay muted></video>
    <div class="ambient-glow"></div>

    <div class="topbar">
      <div class="brand-group">
        <div class="brand">observe lab</div>
        <div class="brand-subtitle">后摄诊断页</div>
      </div>
      <div class="status-group">
        <div id="labStatus" class="status">等待开始</div>
        <div id="labBuildStamp" class="build-stamp" aria-label="build version"></div>
      </div>
    </div>

    <div id="labCompactStatus" class="lab-compact-status">对称模式 · 当前追蓝色</div>

    <div id="labCaptureCluster" class="capture-cluster lab-capture-cluster" aria-hidden="true">
      <div id="labCaptureFrame" class="capture-frame is-active">
        <div class="capture-frame-core"></div>
        <div id="labCenterZone" class="lab-center-zone"></div>
      </div>
    </div>

    <div id="labTargetsLayer" class="lab-targets-layer" aria-hidden="true"></div>

    <div class="bottom-panel lab-panel">
      <div class="bottom-panel-expanded">
        <div class="panel-header">
          <div class="panel-caption">诊断控制</div>
        </div>

        <div class="modes">
          <button id="pairModeBtn" class="mode-btn active" type="button">对称模式</button>
          <button id="sampleModeBtn" class="mode-btn" type="button">采样模式</button>
        </div>

        <div id="pairPresetGroup" class="lab-control-group">
          <div class="lab-control-label">对称预设</div>
          <div class="lab-chip-row">
            <button id="presetHorizontalBtn" class="lab-chip active" type="button">水平</button>
            <button id="presetVerticalBtn" class="lab-chip" type="button">垂直</button>
            <button id="presetDiagonalBtn" class="lab-chip" type="button">斜向</button>
          </div>
        </div>

        <div class="lab-control-group">
          <div class="lab-control-label">当前想追的目标</div>
          <div id="labTargetPicker" class="lab-target-picker"></div>
        </div>

        <div class="lab-actions">
          <button id="labStartBtn" class="primary-btn" type="button">开始实验</button>
          <button id="labRecenterBtn" class="secondary-btn" type="button">重标定观察窗</button>
        </div>

        <div id="labSummaryBar" class="lab-summary-bar" aria-live="polite">
          <div id="labSummaryPrimary" class="lab-summary-primary">当前目标：蓝色 · 当前更接近中心：--</div>
          <div id="labSummarySecondary" class="lab-summary-secondary">判读：后摄未就绪</div>
        </div>

        <button id="labDebugToggle" class="lab-debug-toggle" type="button" aria-expanded="false">
          展开诊断详情
        </button>

        <div id="labDebugDetails" class="lab-debug-details hidden">
          <div class="observe-debug-title">observe lab</div>
          <pre id="labDebugContent" class="observe-debug-content"></pre>
        </div>

        <div class="hint">
          <div>1. 这页不做飞行、惊走、timing，只测后摄“逼近谁”的语义。</div>
          <div>2. 对着你想追的颜色或编号去移动后摄，看谁更先靠近中心区。</div>
        </div>
      </div>
    </div>
  </div>

  <script src="observe-diagnostics-core.js"></script>
  <script src="observe-lab.js"></script>
</body>
</html>
