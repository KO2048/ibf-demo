<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ifafa Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <video id="camera" playsinline autoplay muted></video>
    <canvas id="fx"></canvas>

    <div class="ambient-glow"></div>

    <div class="topbar">
      <div class="brand-group">
        <div class="brand">ifafa demo</div>
        <div class="brand-subtitle">单机版飞行捕捉 MVP</div>
      </div>
      <div id="status" class="status">等待开始</div>
    </div>

    <div class="flight-card">
      <div class="eyebrow">当前目标</div>
      <div id="specimenName" class="specimen-name">等待蝴蝶出现</div>
      <div id="specimenMeta" class="specimen-meta">点击开始后进入观察状态</div>
    </div>

    <div id="butterfly" class="hidden" aria-label="butterfly">
      <div class="butterfly-shadow"></div>
      <div id="butterflyFigure" class="butterfly-figure">
        <img id="butterflySprite" class="butterfly-sprite hidden" alt="butterfly sprite" />
        <div id="butterflyRig" class="butterfly-rig hidden" aria-hidden="true">
          <div id="partBody" class="butterfly-part part-body">
            <img class="butterfly-part-image" alt="" />
          </div>
          <div id="partWingFrontLeft" class="butterfly-part part-wing-front-left">
            <img class="butterfly-part-image" alt="" />
          </div>
          <div id="partWingFrontRight" class="butterfly-part part-wing-front-right">
            <img class="butterfly-part-image" alt="" />
          </div>
          <div id="partWingBackLeft" class="butterfly-part part-wing-back-left">
            <img class="butterfly-part-image" alt="" />
          </div>
          <div id="partWingBackRight" class="butterfly-part part-wing-back-right">
            <img class="butterfly-part-image" alt="" />
          </div>
        </div>
        <div id="butterflyArt" class="butterfly-art">
          <div class="wing wing-back left"></div>
          <div class="wing wing-front left"></div>
          <div class="body"></div>
          <div class="wing wing-back right"></div>
          <div class="wing wing-front right"></div>
        </div>
      </div>
    </div>

    <div id="captureFrame" class="capture-frame hidden" aria-hidden="true">
      <div class="capture-frame-core"></div>
    </div>

    <div id="timingHud" class="timing-hud hidden" aria-hidden="true">
      <div class="timing-head">
        <div class="timing-title">捕获时机</div>
        <div id="timingMeta" class="timing-meta">主玩法：入框后看准窗口甩动</div>
      </div>
      <div id="timingBar" class="timing-bar">
        <div id="timingWindow" class="timing-window"></div>
        <div id="timingCursor" class="timing-cursor"></div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="resultCard" class="result-card hidden">
      <div id="resultBadge" class="result-badge">捕获成功</div>
      <div id="resultTitle" class="result-title">你抓到了暮光蝶</div>
      <div id="resultMeta" class="result-meta">轻快型 · Common</div>
      <div id="resultFlavor" class="result-flavor">它像一片被阳光唤醒的叶子，在你面前轻轻拐了一个弯。</div>
      <div class="result-actions">
        <button id="continueBtn" class="secondary-btn">继续探索</button>
      </div>
    </div>

    <div class="bottom-panel">
      <button id="startBtn" class="primary-btn">开始体验</button>
      <div class="modes">
        <button id="swipeModeBtn" class="mode-btn active">备用：滑动</button>
        <button id="shakeModeBtn" class="mode-btn">主玩法：甩动</button>
      </div>
      <div class="hint">
        <div>1. 点击“开始体验”后允许相机权限，再点击“主玩法：甩动”申请动作权限。</div>
        <div>2. 将蝴蝶引入中央画框，等待指针 X 落入高亮窗口 MN。</div>
        <div>3. 在窗口内快速甩动即可命中；滑动仍保留为备用兜底。</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
